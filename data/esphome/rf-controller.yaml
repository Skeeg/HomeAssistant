#     - logger.set_level: INFO
#     - logger.set_level:
#         level: DEBUG
#         tag: mqtt.client

uart:
  tx_pin: 1
  rx_pin: 3
  baud_rate: 19200

light:
  - platform: status_led
    name: "Switch state"
    pin: GPIO13

api:
  services:
    - service: send_rf_code
      variables:
        sync: int
        low: int
        high: int
        code: int
      then:
        - rf_bridge.send_code:
            sync: !lambda 'return sync;'
            low: !lambda 'return low;'
            high: !lambda 'return high;'
            code: !lambda 'return code;'
    - service: learn
      then:
        - rf_bridge.learn
rf_bridge:
  on_code_received:
    then:
      - homeassistant.event:
          event: esphome.rf_code_received
          data:
            sync: !lambda 'return format_hex(data.sync);'
            low: !lambda 'return format_hex(data.low);'
            high: !lambda 'return format_hex(data.high);'
            code: !lambda 'return format_hex(data.code);'
            
button:
  - platform: template
    name: "Turn On Lamp"
    # icon: "mdi:volume-plus"
    on_press:
      - rf_bridge.send_code:
          sync: 0x2770 
          low: 0x016E 
          high: 0x044A 
          code: 0x505500
  - platform: template
    name: "Turn Off Lamp"
    # icon: "mdi:volume-plus"
    on_press:
      - rf_bridge.send_code:
          sync: 0x278C  
          low: 0x017C  
          high: 0x043C  
          code: 0x505500

debug:
  # level: debug
